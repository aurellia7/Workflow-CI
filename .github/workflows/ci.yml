name: CI - Sentiment Analysis Training

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  train-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 dagshub==0.7.0 pandas==2.2.3 numpy==1.26.4 scikit-learn==1.5.2 joblib==1.4.2

      - name: Train model
        env:
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          cd MLProject
          python modelling.py

      - name: Upload model artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mlruns
          path: MLProject/mlruns
          if-no-files-found: ignore

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install MLflow for Docker build
        run: pip install mlflow==2.19.0

      - name: Build and push Docker image
        env:
          MLFLOW_TRACKING_USERNAME: aurellia7
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_URI: https://dagshub.com/aurellia7/Eksperimen_SML_Aurellia-Dzakiruna.mlflow
        run: |
          mlflow models build-docker -m "runs:/d3239fd9006c45d3837fdfd53d74a086/model" -n "aurellia7/workflow-ci" --env-manager local
          docker push aurellia7/workflow-ci:latest